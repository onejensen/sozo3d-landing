<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sozo3D — Impresión 3D Personalizada</title>
  <meta name="description" content="Impresión 3D personalizada para particulares y empresas. Prototipos, piezas decorativas, repuestos y más. Pide presupuesto sin compromiso." />
  <link rel="icon" type="image/jpeg" href="assets/Logo_Sozo3D.jpg" />
  <link
    href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; }

    /* ── Tokens ── */
    :root {
      --orange:   #E87722;
      --black:    #0f0f0f;
      --black2:   #1a1a1a;
      --dark:     #080808;
      --white:    #ffffff;
      --muted:    #777777;
      --font:     'Clash Display', sans-serif;
      --wa-green: #25D366;
    }

    /* ── Base ── */
    body {
      font-family: var(--font);
      background: var(--black);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Max-width wrapper (desktop centering) ── */
    .page {
      max-width: 480px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- sections go here -->
    <p style="color:#E87722;padding:2rem;text-align:center;">Sozo3D — En construcción</p>
  </div>
</body>
